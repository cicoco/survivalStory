<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Host Server</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1a24;
      color: #e6eef7;
      padding: 18px 14px;
    }
    .wrap { max-width: 860px; margin: 0 auto; }
    .card {
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.06);
      padding: 14px;
      margin-bottom: 12px;
    }
    h1 { margin: 0 0 10px; font-size: 22px; }
    .row { display: grid; grid-template-columns: 120px 1fr; gap: 8px; margin: 6px 0; }
    .k { color: #b7c9db; font-size: 13px; }
    .v { font-weight: 700; font-size: 14px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .muted { color: #b7c9db; font-size: 12px; }
    button {
      height: 36px;
      border-radius: 8px;
      border: 1px solid #84b9a3;
      background: #d5f0e6;
      color: #183027;
      font-weight: 600;
      cursor: pointer;
      padding: 0 12px;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-leave {
      border-color: #d7a4a1;
      background: #ffd8d5;
      color: #4a1f1d;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>房主 Server 页面</h1>
      <div class="row"><div class="k">玩家</div><div class="v" id="name">-</div></div>
      <div class="row"><div class="k">房间</div><div class="v mono" id="room">-</div></div>
      <div class="row"><div class="k">状态</div><div class="v" id="status">-</div></div>
      <div class="row"><div class="k">最大人数</div><div class="v" id="maxPlayers">-</div></div>
      <div class="row"><div class="k">AI 上限</div><div class="v" id="maxAi">-</div></div>
      <div class="row"><div class="k">当前人数</div><div class="v" id="members">-</div></div>
      <div style="margin-top:10px; display:grid; grid-template-columns:1fr 1fr; gap:8px;">
        <button id="startBtn" onclick="startGame()">Start</button>
        <button id="leaveBtn" class="btn-leave" onclick="leaveRoom()">Leave</button>
      </div>
      <div class="muted" id="msg" style="margin-top:10px;">每 5 秒自动刷新状态。</div>
    </div>
  </div>
  <script>
    function setMsg(t){ document.getElementById("msg").textContent = t; }
    async function refreshRoom(){
      try{
        const resp = await fetch("/room");
        const data = await resp.json();
        if(!resp.ok) throw new Error(data.message || ("HTTP " + resp.status));
        document.getElementById("name").textContent = data.name || "-";
        document.getElementById("room").textContent = data.room_id || "-";
        document.getElementById("status").textContent = (data.room_status_cn || "未知") + " (" + (data.room_status || "UNKNOWN") + ")";
        document.getElementById("maxPlayers").textContent = String(data.room_max_players || 0);
        document.getElementById("maxAi").textContent = String(data.room_max_ai || 0);
        document.getElementById("members").textContent = String(data.room_member_count || 0);
        const btn = document.getElementById("startBtn");
        const leaveBtn = document.getElementById("leaveBtn");
        btn.disabled = !data.is_host || (data.room_status === "RUNNING");
        btn.textContent = data.is_host ? (data.room_status === "RUNNING" ? "已开局" : "Start") : "仅房主可开始";
        leaveBtn.disabled = !data.in_room;
        leaveBtn.textContent = data.is_host ? "关闭房间" : "退出房间";
      }catch(err){
        setMsg("刷新失败: " + err.message);
      }
    }
    async function startGame(){
      try{
        const resp = await fetch("/start", {method:"POST", headers:{"Content-Type":"application/json"}, body:"{}"});
        const data = await resp.json();
        if(!resp.ok) throw new Error(data.message || ("HTTP " + resp.status));
        setMsg("已提交 Start 请求");
        setTimeout(refreshRoom, 300);
      }catch(err){
        setMsg("Start 失败: " + err.message);
      }
    }
    async function leaveRoom(){
      try{
        const resp = await fetch("/leave", {method:"POST", headers:{"Content-Type":"application/json"}, body:"{}"});
        const data = await resp.json();
        if(!resp.ok) throw new Error(data.message || ("HTTP " + resp.status));
        setMsg("已提交 Leave 请求");
        setTimeout(refreshRoom, 300);
      }catch(err){
        setMsg("Leave 失败: " + err.message);
      }
    }
    refreshRoom();
    setInterval(refreshRoom, 5000);
  </script>
</body>
</html>
