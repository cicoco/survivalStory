<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Survival Lobby</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap");

    :root {
      --bg-0: #0b131b;
      --bg-1: #152737;
      --card: #f7fafc;
      --ink: #12202c;
      --muted: #53687a;
      --line: #d6e0ea;
      --warn: #8a5a00;
      --ok: #0f6d50;
      --danger: #8d201a;
      --shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Sans", "Noto Sans SC", "PingFang SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1000px 420px at 10% -10%, rgba(43, 138, 198, 0.32), transparent 60%),
        radial-gradient(1000px 420px at 85% -20%, rgba(255, 204, 102, 0.24), transparent 60%),
        linear-gradient(160deg, var(--bg-0), var(--bg-1));
      padding: 20px 12px;
    }

    .shell { max-width: 1160px; margin: 0 auto; display: grid; gap: 14px; }
    .hero {
      border-radius: 16px;
      padding: 16px 18px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: linear-gradient(130deg, rgba(255,255,255,.1), rgba(255,255,255,.03));
      color: #e6eef7;
    }
    .title { margin: 0; font-family: "JetBrains Mono", monospace; font-size: clamp(20px, 3.4vw, 30px); }
    .subtitle { margin: 8px 0 0; font-size: 13px; color: #c3d3e4; }

    .top-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--card);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #f0f6fb;
    }
    .head h2 { margin: 0; font-size: 14px; letter-spacing: .03em; color: #2b4358; }
    .body { padding: 12px 14px; }

    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
    .field label { font-size: 12px; color: var(--muted); }
    input, button {
      height: 38px;
      border-radius: 10px;
      border: 1px solid #c8d3df;
      padding: 0 12px;
      font-size: 14px;
      font-family: inherit;
    }
    input:focus { outline: none; border-color: #2b8ac6; box-shadow: 0 0 0 3px rgba(43, 138, 198, 0.2); }
    button { cursor: pointer; font-weight: 600; background: #eaf2f9; color: #1a3144; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .btn-refresh { background: #dceefb; border-color: #9ecde9; }
    .btn-create { background: #ffe8b6; border-color: #e0bd72; width: 100%; }
    .btn-join { background: #dff6ee; border-color: #93d7c0; }
    .btn-start { background: #d5f0e6; border-color: #8ccab3; width: 100%; }
    .btn-leave { background: #ffd8d5; border-color: #e1a3a0; width: 100%; }
    .room-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }

    .kv { display: grid; grid-template-columns: 86px 1fr; gap: 6px 10px; align-items: center; }
    .k { font-size: 12px; color: var(--muted); }
    .v { font-size: 14px; font-weight: 700; color: #213245; }
    .mono { font-family: "JetBrains Mono", monospace; font-size: 13px; }
    .status { font-weight: 700; }
    .status-waiting { color: var(--warn); }
    .status-running { color: var(--ok); }

    .create-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }

    .list-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 12px 14px; border-bottom: 1px solid var(--line); background: #f0f6fb; }
    .table-wrap { padding: 8px 14px 14px; overflow-x: hidden; }
    table { width: 100%; table-layout: fixed; border-collapse: collapse; }
    th, td {
      text-align: left;
      padding: 10px 6px;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    th { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .03em; }
    .c-room { width: 22%; }
    .c-host { width: 24%; }
    .c-status { width: 16%; }
    .c-cap { width: 20%; }
    .c-action { width: 18%; }

    .msg {
      margin-top: 10px;
      border: 1px dashed #bfd0df;
      border-radius: 12px;
      background: #f7fbff;
      color: #244158;
      padding: 10px 12px;
      font-size: 13px;
      min-height: 42px;
      display: flex;
      align-items: center;
    }
    .msg.error { border-color: #e4b4b0; background: #fff5f4; color: var(--danger); }
    .pager {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .pager button {
      height: 30px;
      padding: 0 10px;
    }

    @media (max-width: 940px) { .top-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1 class="title">生存游戏面板</h1>
      <p class="subtitle">上方查看个人与房间信息，下方手动刷新在线房间列表。</p>
    </section>

    <section class="top-grid">
      <article class="card">
        <div class="head">
          <h2>当前玩家</h2>
          <button class="btn-refresh" onclick="refreshMe()">刷新状态</button>
        </div>
        <div class="body">
          <div class="kv" style="margin-bottom:10px;">
            <div class="k">名称</div>
            <div class="v" id="meName">-</div>
            <div class="k">客户端地址</div>
            <div class="v mono" id="meClientAddr">http://127.0.0.1:17890</div>
          </div>
          <div class="field" style="margin-bottom:0;">
            <label>本地客户端地址（控制接口）</label>
            <input id="ctl" value="http://127.0.0.1:17890" oninput="onControlAddrChanged()" />
          </div>
        </div>
      </article>

      <article class="card">
        <div class="head">
          <h2>房间信息</h2>
        </div>
        <div class="body">
          <div id="roomInfoView" style="display:none;">
            <div class="kv">
              <div class="k">房间</div>
              <div class="v mono" id="meRoom">-</div>
              <div class="k">状态</div>
              <div class="v" id="meStatus">-</div>
              <div class="k">最大人数</div>
              <div class="v" id="meMaxPlayers">-</div>
              <div class="k">允许AI人数</div>
              <div class="v" id="meMaxAi">-</div>
              <div class="k">当前人数</div>
              <div class="v" id="meMemberCount">-</div>
            </div>
            <div class="room-actions">
              <button id="startBtn" class="btn-start" onclick="startGame()">Start</button>
              <button id="enterGameBtn" class="btn-refresh" onclick="enterGame()">进入游戏</button>
              <button id="leaveBtn" class="btn-leave" onclick="leaveRoom()">Leave</button>
            </div>
          </div>
          <div id="roomCreateView">
            <div class="create-grid">
              <div class="field">
                <label>最大人数</label>
                <input id="maxPlayers" type="number" min="1" value="6" />
              </div>
              <div class="field">
                <label>允许AI人数</label>
                <input id="maxAi" type="number" min="0" value="1" />
              </div>
            </div>
            <button class="btn-create" onclick="createRoom()">创建房间</button>
          </div>
        </div>
      </article>
    </section>

    <section class="card">
      <div class="list-head">
        <h2 style="margin:0; font-size:14px; letter-spacing:.03em; color:#2b4358;">在线房间列表</h2>
        <button class="btn-refresh" onclick="refreshRooms()">刷新房间</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th class="c-room">Room</th>
              <th class="c-host">Host</th>
              <th class="c-status">Status</th>
              <th class="c-cap">Capacity</th>
              <th class="c-action">Action</th>
            </tr>
          </thead>
          <tbody id="rooms">
            <tr><td colspan="5">点击上方“刷新房间”获取房间列表</td></tr>
          </tbody>
        </table>
      </div>
      <div class="body" style="padding-top:0;">
        <div class="pager">
          <button id="prevPageBtn" class="btn-refresh" onclick="prevPage()">上一页</button>
          <span id="pageInfo">第 1 / 1 页</span>
          <button id="nextPageBtn" class="btn-refresh" onclick="nextPage()">下一页</button>
        </div>
      </div>
      <div class="body" style="padding-top:0;">
        <div id="msg" class="msg">就绪。</div>
      </div>
    </section>
  </main>

  <script>
    let meState = { in_room: false, room_id: "" };
    let mePollTimer = null;
    let lastCtlBase = "";
    let ctlChangeTimer = null;
    let meRefreshTimer = null;
    let meRefreshInFlight = false;
    let meRefreshQueued = false;
    let roomPage = 1;
    const roomPageSize = 20;
    let roomTotalPages = 1;

    function statusCn(v){ return (v || "WAITING") === "RUNNING" ? "游戏中" : "等待中"; }
    function statusClass(v){ return (v || "WAITING") === "RUNNING" ? "status-running" : "status-waiting"; }
    function setMsg(text, isError){
      const msg = document.getElementById("msg");
      msg.textContent = text;
      msg.className = isError ? "msg error" : "msg";
    }
    function applyJoinButtonState(){
      const buttons = document.querySelectorAll(".btn-join");
      buttons.forEach((btn) => {
        if (meState.in_room) {
          btn.disabled = true;
          btn.textContent = "已在房间";
        } else if (btn.dataset.running === "1") {
          btn.disabled = true;
          btn.textContent = "Join";
        } else {
          btn.disabled = false;
          btn.textContent = "Join";
        }
      });
    }
    function updateRoomPolling(inRoom){
      if (inRoom) {
        if (mePollTimer === null) {
          mePollTimer = setInterval(() => {
            refreshMe();
          }, 5000);
        }
        return;
      }
      if (mePollTimer !== null) {
        clearInterval(mePollTimer);
        mePollTimer = null;
      }
    }
    function syncClientAddr(){
      document.getElementById("meClientAddr").textContent = document.getElementById("ctl").value || "-";
    }
    function resetMeViewForEndpointSwitch(){
      meState = { in_room: false, room_id: "" };
      updateRoomPolling(false);
      document.getElementById("meName").textContent = "-";
      document.getElementById("meRoom").textContent = "-";
      document.getElementById("meStatus").textContent = "-";
      document.getElementById("meMaxPlayers").textContent = "-";
      document.getElementById("meMaxAi").textContent = "-";
      document.getElementById("meMemberCount").textContent = "-";
      document.getElementById("roomInfoView").style.display = "none";
      document.getElementById("roomCreateView").style.display = "block";
      const startBtn = document.getElementById("startBtn");
      const enterGameBtn = document.getElementById("enterGameBtn");
      const leaveBtn = document.getElementById("leaveBtn");
      if (startBtn) {
        startBtn.disabled = true;
        startBtn.textContent = "仅房主可开始";
      }
      if (enterGameBtn) {
        enterGameBtn.disabled = true;
        enterGameBtn.textContent = "未开局";
      }
      if (leaveBtn) {
        leaveBtn.disabled = true;
        leaveBtn.textContent = "退出房间";
      }
      applyJoinButtonState();
    }
    function onControlAddrChanged(){
      syncClientAddr();
      if (ctlChangeTimer !== null) {
        clearTimeout(ctlChangeTimer);
      }
      ctlChangeTimer = setTimeout(() => {
        const base = document.getElementById("ctl").value.replace(/\/$/, "");
        if (base === lastCtlBase) {
          return;
        }
        lastCtlBase = base;
        resetMeViewForEndpointSwitch();
        refreshMe();
      }, 250);
    }

    async function refreshMe(){
      if (meRefreshInFlight) {
        meRefreshQueued = true;
        return;
      }
      meRefreshInFlight = true;
      const base = document.getElementById("ctl").value.replace(/\/$/, "");
      if (base && base !== lastCtlBase) {
        lastCtlBase = base;
        resetMeViewForEndpointSwitch();
      }
      try {
        const resp = await fetch(base + "/me");
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.message || ("HTTP " + resp.status));

        document.getElementById("meName").textContent = data.name || "-";
        document.getElementById("meRoom").textContent = data.room_id || "-";
        const st = (data.room_status_cn || "未知") + " (" + (data.room_status || "UNKNOWN") + ")";
        document.getElementById("meStatus").innerHTML = `<span class="status ${statusClass(data.room_status)}">${st}</span>`;
        document.getElementById("meMaxPlayers").textContent = String(data.room_max_players || 0);
        document.getElementById("meMaxAi").textContent = String(data.room_max_ai || 0);
        document.getElementById("meMemberCount").textContent = String(data.room_member_count || 0);

        const inRoom = !!data.in_room;
        meState = {
          in_room: inRoom,
          room_id: data.room_id || "",
        };
        updateRoomPolling(inRoom);
        document.getElementById("roomInfoView").style.display = inRoom ? "block" : "none";
        document.getElementById("roomCreateView").style.display = inRoom ? "none" : "block";
        const startBtn = document.getElementById("startBtn");
        const enterGameBtn = document.getElementById("enterGameBtn");
        const leaveBtn = document.getElementById("leaveBtn");
        if (startBtn) {
          startBtn.disabled = !data.is_host || (data.room_status === "RUNNING");
          startBtn.textContent = data.is_host ? (data.room_status === "RUNNING" ? "已开局" : "Start") : "仅房主可开始";
        }
        if (enterGameBtn) {
          const canEnter = inRoom && data.room_status === "RUNNING";
          enterGameBtn.disabled = !canEnter;
          enterGameBtn.textContent = canEnter ? "进入游戏" : "未开局";
        }
        if (leaveBtn) {
          leaveBtn.disabled = !inRoom;
          leaveBtn.textContent = data.is_host ? "关闭房间" : "退出房间";
        }
        applyJoinButtonState();
      } catch (err) {
        setMsg("状态查询失败: " + err.message, true);
      } finally {
        meRefreshInFlight = false;
        if (meRefreshQueued) {
          meRefreshQueued = false;
          setTimeout(() => refreshMe(), 150);
        }
      }
    }

    async function createRoom(){
      const base = document.getElementById("ctl").value.replace(/\/$/, "");
      const maxPlayers = Number(document.getElementById("maxPlayers").value || "6");
      const maxAi = Number(document.getElementById("maxAi").value || String(maxPlayers));
      try {
        const resp = await fetch(base + "/create", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ max_players: maxPlayers, max_ai: maxAi })
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.message || ("HTTP " + resp.status));
        setMsg(`已提交创建请求: max_players=${maxPlayers}, max_ai=${maxAi}`, false);
        scheduleMeRefresh();
      } catch (err) {
        setMsg("创建失败: " + err.message, true);
      }
    }

    async function refreshRooms(){
      try {
        const resp = await fetch(`/api/rooms?page=${roomPage}&page_size=${roomPageSize}`);
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.message || ("HTTP " + resp.status));
        const list = data.rooms || [];
        roomTotalPages = Math.max(1, Number(data.total_pages || 1));
        roomPage = Math.max(1, Math.min(roomPage, roomTotalPages));
        document.getElementById("pageInfo").textContent = `第 ${roomPage} / ${roomTotalPages} 页`;
        document.getElementById("prevPageBtn").disabled = roomPage <= 1;
        document.getElementById("nextPageBtn").disabled = roomPage >= roomTotalPages;
        const tbody = document.getElementById("rooms");
        if (!list.length) {
          tbody.innerHTML = '<tr><td colspan="5">暂无房间</td></tr>';
          setMsg(`房间列表已刷新：第 ${roomPage}/${roomTotalPages} 页暂无房间。`, false);
          return;
        }
        tbody.innerHTML = list.map(r => {
          const running = (r.status || "WAITING") === "RUNNING";
          const joinedElsewhere = meState.in_room;
          const disabled = (running || joinedElsewhere) ? "disabled" : "";
          const joinLabel = joinedElsewhere ? "已在房间" : "Join";
          const humanPlayers = Number(r.human_players || 0);
          const maxPlayers = Number(r.max_players || 0);
          return `<tr>
            <td class="mono">${r.room_id}</td>
            <td>${r.host_name}</td>
            <td><span class="status ${statusClass(r.status)}">${statusCn(r.status)}</span></td>
            <td>${humanPlayers}/${maxPlayers}</td>
            <td><button class="btn-join" data-running="${running ? "1" : "0"}" ${disabled} onclick="joinRoom('${r.room_id}')">${joinLabel}</button></td>
          </tr>`;
        }).join("");
        applyJoinButtonState();
        setMsg(`房间列表已刷新：第 ${roomPage}/${roomTotalPages} 页。`, false);
      } catch (err) {
        setMsg("刷新失败: " + err.message, true);
      }
    }
    function prevPage(){
      if (roomPage <= 1) return;
      roomPage -= 1;
      refreshRooms();
    }
    function nextPage(){
      if (roomPage >= roomTotalPages) return;
      roomPage += 1;
      refreshRooms();
    }

    async function joinRoom(roomId){
      if (meState.in_room) {
        setMsg("你已在房间中，不能再加入其他房间。", true);
        return;
      }
      const base = document.getElementById("ctl").value.replace(/\/$/, "");
      try {
        const resp = await fetch(base + "/join", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ room_id: roomId })
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.message || ("HTTP " + resp.status));
        setMsg("已提交 Join 请求: " + roomId, false);
        scheduleMeRefresh();
      } catch (err) {
        setMsg("加入失败: " + err.message, true);
      }
    }

    async function startGame(){
      const base = document.getElementById("ctl").value.replace(/\/$/, "");
      try {
        const resp = await fetch(base + "/start", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: "{}"
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.message || ("HTTP " + resp.status));
        setMsg("已提交 Start 请求。", false);
        scheduleMeRefresh();
      } catch (err) {
        setMsg("Start 失败: " + err.message, true);
      }
    }

    async function leaveRoom(){
      const base = document.getElementById("ctl").value.replace(/\/$/, "");
      try {
        const resp = await fetch(base + "/leave", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: "{}"
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.message || ("HTTP " + resp.status));
        setMsg("已提交 Leave 请求。", false);
        scheduleMeRefresh();
      } catch (err) {
        setMsg("Leave 失败: " + err.message, true);
      }
    }

    function enterGame(){
      const base = document.getElementById("ctl").value.replace(/\/$/, "");
      const w = window.open(base + "/game", "_blank");
      if (!w) {
        setMsg("打开失败：请允许弹窗或手动访问本地 /game 页面。", true);
      }
    }

    function scheduleMeRefresh(){
      if (meRefreshTimer !== null) {
        clearTimeout(meRefreshTimer);
      }
      meRefreshTimer = setTimeout(() => {
        meRefreshTimer = null;
        refreshMe();
      }, 500);
    }

    document.addEventListener("DOMContentLoaded", () => {
      syncClientAddr();
      lastCtlBase = document.getElementById("ctl").value.replace(/\/$/, "");
      refreshMe();
      refreshRooms();
    });
  </script>
</body>
</html>
