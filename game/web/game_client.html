<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Game Client</title>
  <style>
    :root {
      --bg: #101a24;
      --card: rgba(255, 255, 255, 0.07);
      --line: rgba(255, 255, 255, 0.16);
      --text: #eaf1f8;
      --muted: #b7c9db;
      --q: #8b1f1f;
      --x: #684a2f;
      --safe: #23495d;
      --me: #f2d66b;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 14px;
    }
    .wrap { max-width: 980px; margin: 0 auto; display: grid; gap: 12px; }
    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card);
      padding: 12px;
    }
    h1 { margin: 0 0 8px; font-size: 22px; }
    .top {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 8px;
    }
    .kv {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.04);
    }
    .k { font-size: 12px; color: var(--muted); }
    .v { margin-top: 4px; font-weight: 700; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .map {
      display: grid;
      grid-template-columns: repeat(9, minmax(0, 1fr));
      gap: 4px;
    }
    .cell {
      aspect-ratio: 1 / 1;
      min-height: 44px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: rgba(255,255,255,0.92);
      text-shadow: 0 1px 2px rgba(0,0,0,0.7);
      background-size: cover;
      background-position: center;
      box-shadow: inset 0 -8px 12px rgba(0,0,0,0.14);
    }
    .tile-label {
      position: absolute;
      top: 4px;
      left: 4px;
      right: 4px;
      border-radius: 4px;
      padding: 1px 4px;
      font-size: 11px;
      line-height: 1.2;
      text-align: center;
      background: rgba(13, 22, 31, 0.72);
      color: #e9f3fb;
      border: 1px solid rgba(255,255,255,0.18);
      pointer-events: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tile-q { background-color: var(--q); }
    .tile-x { background-color: var(--x); }
    .tile-safe { background-color: var(--safe); }
    .cell.me {
      box-shadow: 0 0 0 3px rgba(242,214,107,0.95), inset 0 -8px 12px rgba(0,0,0,0.14);
      color: #1f1705;
      background-image: radial-gradient(circle at center, rgba(242,214,107,.95) 0 46%, transparent 47%);
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 8px;
    }
    input {
      height: 38px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      padding: 0 10px;
      font-size: 14px;
    }
    button {
      height: 38px;
      border-radius: 8px;
      border: 1px solid #8cb7d8;
      background: #d8ebfb;
      color: #173248;
      font-weight: 600;
      cursor: pointer;
      padding: 0 12px;
    }
    button.danger {
      border-color: #d7a4a1;
      background: #ffd8d5;
      color: #4a1f1d;
    }
    .msg { color: var(--muted); font-size: 12px; margin-top: 8px; min-height: 18px; }
    .sub {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .history {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
      height: 220px;
      overflow: auto;
      padding: 8px;
      font-size: 12px;
      line-height: 1.45;
    }
    .history-item { margin-bottom: 6px; color: #d7e6f5; }
    .history-time { color: #9fb7cf; margin-right: 6px; }
    @media (max-width: 860px) {
      .top { grid-template-columns: repeat(2, 1fr); }
      .actions { grid-template-columns: 1fr 1fr; }
      .sub { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>游戏页面</h1>
      <div class="top">
        <div class="kv"><div class="k">玩家</div><div class="v" id="name">-</div></div>
        <div class="kv"><div class="k">房间</div><div class="v mono" id="room">-</div></div>
        <div class="kv"><div class="k">阶段</div><div class="v" id="phase">-</div></div>
        <div class="kv"><div class="k">动作序号</div><div class="v" id="seq">-</div></div>
        <div class="kv"><div class="k">坐标</div><div class="v mono" id="pos">-</div></div>
        <div class="kv"><div class="k">水分</div><div class="v" id="water">-</div></div>
        <div class="kv"><div class="k">饱食</div><div class="v" id="food">-</div></div>
        <div class="kv"><div class="k">曝光</div><div class="v" id="exposure">-</div></div>
      </div>
    </section>

    <section class="card">
      <div class="map" id="map"></div>
    </section>

    <section class="card">
      <div class="actions">
        <input id="actionText" placeholder="输入动作：MOVE 2 3 / EXPLORE / REST / TAKE BREAD / USE BREAD ..." />
        <button onclick="sendAction()">提交动作</button>
        <button onclick="queryMembers()">成员</button>
        <button id="leaveBtn" class="danger" onclick="leaveRoom()">Leave</button>
      </div>
      <div class="sub">
        <div class="kv">
          <div class="k">背包</div>
          <div class="v" id="bag">未知</div>
        </div>
        <div class="kv">
          <div class="k">当前建筑可见物资</div>
          <div class="v" id="loot">未知</div>
        </div>
      </div>
      <div class="history" id="history"></div>
      <div id="msg" class="msg">状态每 3 秒自动刷新。</div>
    </section>
  </main>
  <script>
    const MAP = [
      ["Q","Q","Q","Q","Q","Q","Q","Q","Q"],
      ["Q","X","W","X","X","J","X","J","Q"],
      ["Q","J","X","B","B","X","B","X","Q"],
      ["Q","X","S","M","X","W","X","J","Q"],
      ["Q","W","X","J","X","X","W","X","Q"],
      ["Q","B","X","X","X","W","J","J","Q"],
      ["Q","X","J","X","X","M","S","W","Q"],
      ["Q","X","X","X","J","B","X","B","Q"],
      ["Q","Q","Q","Q","Q","Q","Q","Q","Q"]
    ];
    const TILE_ASSETS = {
      "Q": "/assets/tiles/Q.png",
      "X": "/assets/tiles/X.png",
      "J": "/assets/tiles/J.png",
      "B": "/assets/tiles/B.png",
      "S": "/assets/tiles/S.png",
      "W": "/assets/tiles/W.png",
      "M": "/assets/tiles/M.png"
    };
    const TILE_ZH_LABEL = {
      "J": "居民楼",
      "B": "办公楼",
      "M": "药店",
      "S": "超市",
      "W": "水源"
    };
    let latestState = null;
    const historyItems = [];
    function setMsg(t){ document.getElementById("msg").textContent = t; }
    function nowStr(){
      const d = new Date();
      return d.toLocaleTimeString();
    }
    function pushHistory(text){
      if (!text) return;
      historyItems.push({ts: nowStr(), text});
      if (historyItems.length > 300){
        historyItems.splice(0, historyItems.length - 300);
      }
      const box = document.getElementById("history");
      box.innerHTML = historyItems.map(h => (
        `<div class="history-item"><span class="history-time">[${h.ts}]</span>${h.text}</div>`
      )).join("");
      box.scrollTop = box.scrollHeight;
    }
    function extractLine(promptText, prefix){
      if (!promptText) return "";
      const lines = String(promptText).split("\n");
      for (const l of lines){
        if (l.startsWith(prefix)){
          return l.slice(prefix.length).trim();
        }
      }
      return "";
    }
    function tileCls(t){
      if (t === "Q") return "tile-q";
      if (t === "X") return "tile-x";
      return "tile-safe";
    }
    function renderMap(px, py){
      const map = document.getElementById("map");
      map.innerHTML = "";
      for (let y = 1; y <= 9; y++){
        for (let x = 1; x <= 9; x++){
          const t = MAP[y-1][x-1];
          const el = document.createElement("div");
          el.className = "cell " + tileCls(t) + ((x === px && y === py) ? " me" : "");
          const asset = TILE_ASSETS[t];
          if (asset) {
            el.style.backgroundImage = `url(${asset})`;
            el.textContent = "";
          } else {
            el.textContent = t;
          }
          const zh = TILE_ZH_LABEL[t];
          if (zh) {
            const lab = document.createElement("div");
            lab.className = "tile-label";
            lab.textContent = zh;
            el.appendChild(lab);
          }
          map.appendChild(el);
        }
      }
    }
    function renderState(data){
      latestState = data;
      document.getElementById("name").textContent = data.name || "-";
      document.getElementById("room").textContent = data.room_id || "-";
      document.getElementById("phase").textContent = (data.phase || "-") + " / #" + String(data.phase_no || 0);
      document.getElementById("seq").textContent = String(data.action_seq || 0);
      document.getElementById("pos").textContent = "(" + String(data.player_x || 0) + "," + String(data.player_y || 0) + ")";
      document.getElementById("water").textContent = String(data.player_water || 0);
      document.getElementById("food").textContent = String(data.player_food || 0);
      document.getElementById("exposure").textContent = String(data.player_exposure || 0);
      document.getElementById("bag").textContent = data.bag_text || "未知";
      document.getElementById("loot").textContent = data.visible_loot_text || "未知";
      renderMap(Number(data.player_x || 0), Number(data.player_y || 0));
      const leaveBtn = document.getElementById("leaveBtn");
      leaveBtn.disabled = !data.in_room;
      leaveBtn.textContent = data.is_host ? "关闭房间" : "退出房间";
    }
    function connectEvents(){
      const es = new EventSource("/events");
      es.onmessage = (ev) => {
        try{
          const payload = JSON.parse(ev.data);
          if (payload.type === "state" && payload.snapshot){
            renderState(payload.snapshot);
            return;
          }
          if (payload.type === "room_message" && payload.message){
            const m = payload.message;
            if (m.type === "action_prompt") {
              let bag = "";
              let loot = "";
              if (m.view && typeof m.view === "object") {
                bag = String(m.view.bag_text || "");
                loot = String(m.view.visible_loot_text || "");
              }
              if (!bag) bag = extractLine(m.message || "", "背包物品:");
              if (!loot) loot = extractLine(m.message || "", "当前建筑剩余物资:");
              if (bag) document.getElementById("bag").textContent = bag;
              if (loot) document.getElementById("loot").textContent = loot;
              pushHistory("操作提示已更新");
              setMsg("操作提示已更新，可输入动作。");
            } else if (m.type === "action_ack") {
              pushHistory("动作反馈: " + String(m.status || "") + " (" + String(m.reason || "") + ")");
              setMsg("动作反馈: " + String(m.status || "") + " (" + String(m.reason || "") + ")");
            } else if (m.type === "round_settled") {
              pushHistory("回合结算完成: phase=" + String(m.phase || "") + " seq=" + String(m.action_seq_start || "") + ".." + String(m.action_seq_end || ""));
              setMsg("本轮结算完成。");
            } else if (m.type === "game_over") {
              pushHistory("游戏结束");
              setMsg("游戏结束。");
            } else if (m.type === "event") {
              pushHistory("事件: " + String(m.message || ""));
            } else if (m.type === "members_update") {
              const members = (m.payload && m.payload.members) || [];
              pushHistory("成员更新: " + String(members.length) + " 人");
            }
          }
        }catch(err){
          setMsg("事件解析失败: " + err.message);
        }
      };
      es.onerror = () => {
        setMsg("事件流断开，正在自动重连...");
      };
    }
    async function sendAction(){
      const text = (document.getElementById("actionText").value || "").trim();
      if (!text) {
        setMsg("请输入动作文本");
        return;
      }
      try{
        const resp = await fetch("/action", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body: JSON.stringify({text})
        });
        const data = await resp.json();
        if(!resp.ok) throw new Error(data.message || ("HTTP " + resp.status));
        pushHistory("提交动作: " + text);
        setMsg("动作已提交: " + text);
      }catch(err){
        setMsg("动作提交失败: " + err.message);
      }
    }
    async function queryMembers(){
      try{
        const resp = await fetch("/members", {method:"POST", headers:{"Content-Type":"application/json"}, body:"{}"});
        const data = await resp.json();
        if(!resp.ok) throw new Error(data.message || ("HTTP " + resp.status));
        pushHistory("请求成员列表");
        setMsg("已请求成员列表，请看客户端状态更新。");
      }catch(err){
        setMsg("成员查询失败: " + err.message);
      }
    }
    async function leaveRoom(){
      try{
        const resp = await fetch("/leave", {method:"POST", headers:{"Content-Type":"application/json"}, body:"{}"});
        const data = await resp.json();
        if(!resp.ok) throw new Error(data.message || ("HTTP " + resp.status));
        pushHistory("提交 Leave 请求");
        setMsg("已提交 Leave 请求");
      }catch(err){
        setMsg("Leave 失败: " + err.message);
      }
    }
    connectEvents();
  </script>
</body>
</html>
